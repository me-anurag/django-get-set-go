<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"></stop>
      <stop offset="100%" stop-color="#1e293b"></stop>
    </linearGradient>

    <linearGradient id="pythonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3776AB"></stop>
      <stop offset="100%" stop-color="#FFD43B"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"></rect>

  <!-- Decorative grid -->
  <g opacity="0.08">
    <path d="M0 50 H1200 M0 100 H1200 M0 150 H1200 M0 200 H1200 M0 250 H1200 M0 300 H1200 M0 350 H1200" stroke="#ffffff"></path>
    <path d="M100 0 V400 M200 0 V400 M300 0 V400 M400 0 V400 M500 0 V400
             M600 0 V400 M700 0 V400 M800 0 V400 M900 0 V400 M1000 0 V400 M1100 0 V400" stroke="#ffffff"></path>
  </g>

  <!-- Python-inspired symbol -->
  <g transform="translate(120,95)">
    <rect x="0" y="0" width="120" height="90" rx="20" fill="#3776AB"></rect>
    <circle cx="35" cy="30" r="7" fill="white"></circle>

    <rect x="60" y="60" width="120" height="90" rx="20" fill="#FFD43B"></rect>
    <circle cx="145" cy="120" r="7" fill="#333"></circle>
  </g>

  <!-- Django ring -->
  <circle cx="950" cy="200" r="90" fill="none" stroke="#0C4B33" stroke-width="12" filter="url(#glow)"></circle>

  <text x="950" y="220" font-size="72" text-anchor="middle" fill="#0C4B33" font-family="Arial, sans-serif" font-weight="bold">
    Dj
  </text>

  <!-- Main title -->
  <text x="320" y="165" fill="white" font-size="48" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Python Fundamentals
  </text>

  <text x="320" y="235" fill="#22c55e" font-size="58" font-family="Segoe UI, Arial, sans-serif" font-weight="800">
    for Django
  </text>

  <!-- Subtitle -->
  <text x="320" y="290" fill="#94a3b8" font-size="24" font-family="Segoe UI, Arial, sans-serif">
    Learn Python concepts that power Django development
  </text>

  <!-- Accent line -->
  <rect x="320" y="315" width="420" height="6" rx="3" fill="url(#pythonGrad)"></rect>

</svg>