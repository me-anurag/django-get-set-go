<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"></stop>
      <stop offset="100%" stop-color="#0f172a"></stop>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"></stop>
      <stop offset="50%" stop-color="#22c55e"></stop>
      <stop offset="100%" stop-color="#06b6d4"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <style>
      .title { font-family: Arial; font-size: 56px; fill: #ffffff; font-weight: 700; }
      .label { font-family: Arial; font-size: 17px; fill: #cbd5e1; }
      .small { font-family: Arial; font-size: 14px; fill: #94a3b8; }
      .mono { font-family: monospace; font-size: 13px; fill: #94a3b8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"></rect>

  <!-- Title -->
  <text x="600" y="65" text-anchor="middle" class="title">
    Django Templates
  </text>

  <!-- Flow line -->
  <line x1="140" y1="200" x2="1060" y2="200" stroke="url(#accent)" stroke-width="4" opacity="0.7"></line>

  <!-- VIEW -->
  <g>
    <rect x="120" y="130" width="220" height="140" rx="14" fill="#111827" stroke="#334155"></rect>
    <text x="230" y="170" text-anchor="middle" class="label">VIEW</text>
    <text x="230" y="200" text-anchor="middle" class="small">views.py</text>
    <text x="230" y="225" text-anchor="middle" class="mono">context data</text>
  </g>

  <!-- Arrow -->
  <text x="350" y="205" fill="#38bdf8" font-size="20">→</text>

  <!-- TEMPLATE ENGINE -->
  <g>
    <rect x="380" y="130" width="250" height="140" rx="14" fill="#111827" stroke="#334155"></rect>
    <text x="505" y="170" text-anchor="middle" class="label">TEMPLATE ENGINE</text>
    <text x="505" y="200" text-anchor="middle" class="small">Django Templates</text>
    <text x="505" y="225" text-anchor="middle" class="mono">HTML + {{ variables }}</text>
  </g>

  <!-- Arrow -->
  <text x="640" y="205" fill="#22c55e" font-size="20">→</text>

  <!-- RENDERED HTML -->
  <g filter="url(#glow)">
    <rect x="660" y="130" width="250" height="140" rx="14" fill="url(#accent)"></rect>
    <text x="785" y="170" text-anchor="middle" fill="#0b1220" font-size="18" font-weight="700">RENDERED HTML</text>
    <text x="785" y="200" text-anchor="middle" fill="#0b1220" font-size="14">Final Output</text>
    <text x="785" y="225" text-anchor="middle" fill="#0b1220" font-size="13">Sent to Browser</text>
  </g>

  <!-- Arrow -->
  <text x="920" y="205" fill="#06b6d4" font-size="20">→</text>

  <!-- BROWSER -->
  <g>
    <rect x="940" y="130" width="220" height="140" rx="14" fill="#111827" stroke="#334155"></rect>
    <text x="1050" y="170" text-anchor="middle" class="label">BROWSER</text>
    <text x="1050" y="200" text-anchor="middle" class="small">UI Display</text>
    <text x="1050" y="225" text-anchor="middle" class="mono">HTML Page</text>
  </g>

  <!-- Bottom explanation -->
  <text x="600" y="345" text-anchor="middle" class="small">
    Django templates convert context data into dynamic HTML pages
  </text>

</svg>