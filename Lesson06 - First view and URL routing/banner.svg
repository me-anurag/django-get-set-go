<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"></stop>
      <stop offset="100%" stop-color="#0f172a"></stop>
    </linearGradient>

    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"></stop>
      <stop offset="50%" stop-color="#22c55e"></stop>
      <stop offset="100%" stop-color="#06b6d4"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <style>
      .title { font-family: Arial; font-size: 54px; fill: #ffffff; font-weight: 700; }
      .label { font-family: Arial; font-size: 17px; fill: #cbd5e1; }
      .small { font-family: Arial; font-size: 14px; fill: #94a3b8; }
      .mono { font-family: monospace; font-size: 13px; fill: #94a3b8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"></rect>

  <!-- Title -->
  <text x="600" y="65" text-anchor="middle" class="title">
    First View &amp; URL Routing
  </text>

  <!-- Flow line -->
  <line x1="140" y1="200" x2="1060" y2="200" stroke="url(#flow)" stroke-width="4" opacity="0.7"></line>

  <!-- 1. Browser -->
  <g>
    <rect x="120" y="130" width="210" height="140" rx="14" fill="#111827" stroke="#334155"></rect>
    <text x="225" y="170" text-anchor="middle" class="label">BROWSER</text>
    <text x="225" y="200" text-anchor="middle" class="small">User Request</text>
    <text x="225" y="225" text-anchor="middle" class="mono">GET /home</text>
  </g>

  <!-- Arrow -->
  <text x="340" y="205" fill="#38bdf8" font-size="20">→</text>

  <!-- 2. URL Router -->
  <g>
    <rect x="360" y="130" width="230" height="140" rx="14" fill="#111827" stroke="#334155"></rect>
    <text x="475" y="170" text-anchor="middle" class="label">URL ROUTER</text>
    <text x="475" y="200" text-anchor="middle" class="small">urls.py</text>
    <text x="475" y="225" text-anchor="middle" class="mono">path('', view)</text>
  </g>

  <!-- Arrow -->
  <text x="600" y="205" fill="#22c55e" font-size="20">→</text>

  <!-- 3. View (highlighted) -->
  <g filter="url(#glow)">
    <rect x="620" y="130" width="230" height="140" rx="14" fill="url(#flow)"></rect>
    <text x="735" y="170" text-anchor="middle" fill="#0b1220" font-size="18" font-weight="700">VIEW</text>
    <text x="735" y="200" text-anchor="middle" fill="#0b1220" font-size="14">views.py</text>
    <text x="735" y="225" text-anchor="middle" fill="#0b1220" font-size="13">Logic Execution</text>
  </g>

  <!-- Arrow -->
  <text x="860" y="205" fill="#06b6d4" font-size="20">→</text>

  <!-- 4. Response -->
  <g>
    <rect x="880" y="130" width="210" height="140" rx="14" fill="#111827" stroke="#334155"></rect>
    <text x="985" y="170" text-anchor="middle" class="label">RESPONSE</text>
    <text x="985" y="200" text-anchor="middle" class="small">HTML / JSON</text>
    <text x="985" y="225" text-anchor="middle" class="mono">HttpResponse()</text>
  </g>

  <!-- Bottom explanation -->
  <text x="600" y="345" text-anchor="middle" class="small">
    Django routes HTTP requests through urls.py → views.py → response generation
  </text>

</svg>